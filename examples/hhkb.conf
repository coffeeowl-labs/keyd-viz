# HHKB Hybrid Type-S (PFU Limited, 04fe:0021)
# Vim-style nav + numpad layers via home-row hold (f/d).
# Separate file from laptop.conf so the internal-keyboard remaps stay untouched.

[ids]
04fe:0021
04fe:0202

[main]
# tap = letter, hold = layer.
# lettermod(layer, key, idle_timeout_ms, hold_timeout_ms):
#   - types the letter when struck within idle_timeout of another key (fast typing)
#   - engages the layer only on a deliberate hold (>= hold_timeout) / intervening tap
f = lettermod(nav, f, 150, 200)
d = lettermod(num, d, 150, 200)
# tap = space, hold = symbol layer (brackets). Hold with LEFT thumb, type with right hand.
space = lettermod(sym, space, 150, 200)
# tap = k, hold = Ctrl (right-hand home-row mod). Trial — same timing as the layer holds.
k = lettermod(control, k, 150, 200)

# Gaming lockout: press BOTH shifts together to toggle a passthrough layer that
# restores f/d/space to plain keys. Toggle again to exit; resets to normal on reboot.
leftshift+rightshift = toggle(game)

# --- layer 1: vim arrows + nav cluster (hold f) ---
[nav]
h = left
j = down
k = up
l = right
y = home
u = pagedown
i = pageup
o = end
# n / dot = jump word left / right (mirrors h / l one row down)
n = C-left
dot = C-right
semicolon = backspace
apostrophe = delete

# --- layer 2: numpad-ish (hold d) ---
[num]
space = 0
m = 1
comma = 2
dot = 3
j = 4
k = 5
l = 6
u = 7
i = 8
o = 9
slash = dot
semicolon = minus
p = equal

# --- layer 3: brackets (hold space, left thumb) ---
# index = open, middle = close; row = bracket type.
#   top  u i  = [ ]
#   home j k  = ( )
#   bot  m ,  = { }
[sym]
u = leftbrace
i = rightbrace
j = S-9
k = S-0
m = S-leftbrace
comma = S-rightbrace

# --- gaming passthrough: shadows the tap-hold mods with plain keys ---
[game]
f = f
d = d
space = space
k = k
