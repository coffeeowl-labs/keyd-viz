# Tooling config only. The tool itself is a single stdlib script with no runtime
# dependencies; pytest and ruff below are dev tools.

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
